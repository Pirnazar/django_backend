
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: cargo_db
      POSTGRES_USER: cargo_user
      POSTGRES_PASSWORD: cargo_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cargo_user -d cargo_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://cargo_user:cargo_password@db:5432/cargo_db
      - REDIS_URL=redis://redis:6379/0
      - DJANGO_SETTINGS_MODULE=config.settings.local
      - SECRET_KEY=dev-secret-key-do-not-use-in-production
      - DEBUG=True
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  celery_worker:
    build: .
    command: celery -A config worker -l info
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgres://cargo_user:cargo_password@db:5432/cargo_db
      - REDIS_URL=redis://redis:6379/0
      - DJANGO_SETTINGS_MODULE=config.settings.local
      - SECRET_KEY=dev-secret-key-do-not-use-in-production
    depends_on:
      - redis
      - db

volumes:
  postgres_data:
